<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Work Hours Tracker</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    #app-container {
      display: none; /* Hidden by default */
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .main-content {
      /* Reverting to simple layout */
    }

    .stats-grid {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat-card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 4px;
    }

    .calendar-controls {
      margin-bottom: 10px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .day {
      border: 1px solid #ddd;
      padding: 5px;
      min-height: 60px;
      cursor: pointer;
      position: relative;
    }

    .day.today .date {
      color: rgb(0, 0, 0);
      font-weight: bold;
    }

    .day.selected {
      background-color: #f0f0f0;
    }

    .empty-day {
      background: #fafafa;
      border: none;
    }

    .hours {
      font-size: 0.8em;
      margin-top: 5px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      position: absolute;
      top: 5px;
      right: 5px;
    }

    .ok { background-color: green; }
    .single { background-color: orange; }
    .none { background-color: transparent; }

    .details-card {
      margin-top: 20px;
      border-top: 1px solid #ccc;
      padding-top: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0; width: 100%; height: 100%;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      width: 300px;
      border-radius: 5px;
    }

    .btn-primary {
      padding: 5px 15px;
      cursor: pointer;
    }

    .btn-outline {
      padding: 5px 15px;
      cursor: pointer;
    }

    /* Login Styles - simplified */
    #login-container {
      width: 300px;
      margin: 100px auto;
      padding: 20px;
      border: 1px solid #ccc;
      text-align: center;
    }
    #login-container .btn-primary {
      background-color: #2B8FFF;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 4px;
    }
    #app-container .btn-primary {
      background-color: #2B8FFF;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 4px;
    }

    #userSelect {
      height: 40px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 30px;
    }

    @media (max-width: 480px) {
      body {
        margin: 12px;
      }

      #login-container {
        width: 100%;
        max-width: 360px;
        margin: 48px auto;
        padding: 16px;
        box-sizing: border-box;
      }

      .header {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .header-left {
        width: 100%;
      }

      .header-right {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .stats-grid {
        flex-direction: column;
        gap: 12px;
      }

      .calendar-controls select {
        height: 40px;
      }

      .calendar-header {
        font-size: 12px;
      }

      .day {
        min-height: 52px;
        padding: 4px;
      }

      .hours {
        font-size: 0.7em;
      }

      .modal-content {
        width: calc(100% - 24px);
        margin: 18% auto;
        box-sizing: border-box;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div id="login-container">
    <h2>登录</h2>
    <div class="form-group">
      <label for="userSelect" style="text-align: left;">选择用户</label>
      <select id="userSelect" class="form-control">
        <option value="火星猕猴桃">火星猕猴桃</option>
        <option value="火星哈密瓜">火星哈密瓜</option>
      </select>
    </div>
    <button class="btn-primary" onclick="handleLogin()" style="width: 100%;">登录</button>
    <p id="login-error"></p>
  </div>

  <div id="app-container">
    <header class="header">
      <div class="header-left">
        <h1>工时记录器</h1>
        <button class="btn-primary" onclick="clockIn()">打卡</button>
      </div>
      <div class="header-right">
        <span id="currentUser" style="font-weight: bold; color: #333;"></span>
        <button class="btn-outline" onclick="handleLogout()">退出</button>
      </div>
    </header>

    <main class="main-content">
      <div id="summarySection" class="stats-grid">
        <!-- Summary cards will be injected here -->
      </div>

      <div class="calendar-card">
        <div class="calendar-controls">
          <div>
            <select id="yearSelect" onchange="onMonthChange()"></select>
            <select id="monthSelect" onchange="onMonthChange()"></select>
          </div>
        </div>
        <div class="calendar-header">
          <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
        </div>
        <div id="calendarGrid" class="calendar-grid">
          <!-- Calendar cells will be injected here -->
        </div>
      </div>

      <div id="dayDetails" class="details-card">
        <h3 id="selectedDateHeader">选择日期查看详情</h3>
        <div id="timeEntries"></div>
        <button class="btn-outline" onclick="showManualModal()">+ 补录打卡</button>
      </div>
    </main>
  </div>

  <!-- Manual Add Modal -->
  <div id="manualModal" class="modal">
    <div class="modal-content">
      <h3>补录打卡记录</h3>
      <div class="form-group">
        <label for="manualDate">日期</label>
        <input type="date" id="manualDate" class="form-control">
      </div>
      <div class="form-group">
        <label for="manualTime">时间</label>
        <input type="time" id="manualTime" class="form-control">
      </div>
      <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem;">
        <button class="btn-outline" onclick="hideManualModal()">取消</button>
        <button class="btn-primary" onclick="manualAdd()">保存记录</button>
      </div>
    </div>
  </div>

  <script>
    // --- State Management ---
    let selectedYear = new Date().getFullYear();
    let selectedMonth = new Date().getMonth();
    let currentSelectedDate = getTodayKey();
    let currentUsername = null;
    let workDataCache = {};
    let workDataCacheKey = null;
    let renderSeq = 0;

    const SUPABASE_URL = 'https://rmuzdaknrjrhettqnfai.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_tUx4wW7WU78eVtPCm2cS0w_PkFxEk9x';
    const supabaseClient = (window.supabase && typeof window.supabase.createClient === 'function')
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY)
      : null;
    window.supabaseClient = supabaseClient;

    // --- Mock User Database ---
    const USERS = ["火星猕猴桃", "火星哈密瓜"];

    // --- Core Functions ---
    function formatDateLocal(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getTodayKey() {
      return formatDateLocal(new Date());
    }

    function normalizeTimes(items) {
      return (items || []).map((x) => (typeof x === 'string' ? x : x.ts));
    }

    function getLocalData() {
      if (!currentUsername) return {};
      const key = `workData_${currentUsername}`;
      return JSON.parse(localStorage.getItem(key) || '{}');
    }

    function saveLocalData(data) {
      if (!currentUsername) return;
      const key = `workData_${currentUsername}`;
      localStorage.setItem(key, JSON.stringify(data));
    }

    function getCacheKey(year, month) {
      if (!currentUsername) return null;
      return `${currentUsername}__${year}-${String(month + 1).padStart(2, '0')}`;
    }

    async function loadMonthData(year, month) {
      if (!currentUsername) return {};

      if (!supabaseClient) {
        const local = getLocalData();
        const start = new Date(year, month, 1);
        const end = new Date(year, month + 1, 1);
        const out = {};
        for (const [dateKey, times] of Object.entries(local)) {
          const dateObj = new Date(`${dateKey}T00:00:00`);
          if (dateObj >= start && dateObj < end) {
            out[dateKey] = (times || []).slice();
          }
        }
        return out;
      }

      const startIso = new Date(year, month, 1, 0, 0, 0).toISOString();
      const endIso = new Date(year, month + 1, 1, 0, 0, 0).toISOString();

      const { data, error } = await supabaseClient
        .from('time_entries')
        .select('id, entry_ts')
        .eq('username', currentUsername)
        .gte('entry_ts', startIso)
        .lt('entry_ts', endIso)
        .order('entry_ts', { ascending: true });

      if (error) throw error;

      const out = {};
      for (const row of (data || [])) {
        const dateKey = formatDateLocal(new Date(row.entry_ts));
        if (!out[dateKey]) out[dateKey] = [];
        out[dateKey].push({ id: row.id, ts: row.entry_ts });
      }
      return out;
    }

    async function ensureMonthLoaded(year, month) {
      const key = getCacheKey(year, month);
      if (!key) return;
      if (workDataCacheKey === key) return;

      workDataCacheKey = key;
      workDataCache = {};

      try {
        workDataCache = await loadMonthData(year, month);
      } catch (e) {
        console.error(e);
        workDataCache = {};
      }
    }

    function getData() {
      if (!currentUsername) return {};
      return workDataCache || {};
    }

    // --- Authentication Logic ---
    function handleLogin() {
      const username = document.getElementById('userSelect').value;
      const errorEl = document.getElementById('login-error');

      if (USERS.includes(username)) {
        currentUsername = username;
        sessionStorage.setItem('loggedInUser', username);
        workDataCache = {};
        workDataCacheKey = null;
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('currentUser').textContent = `用户: ${username}`;
        errorEl.textContent = '';
        initApp();
      } else {
        errorEl.textContent = '请选择有效的用户';
        currentUsername = null;
        sessionStorage.removeItem('loggedInUser');
      }
    }

    function handleLogout() {
      currentUsername = null;
      sessionStorage.removeItem('loggedInUser');
      workDataCache = {};
      workDataCacheKey = null;
      document.getElementById('login-container').style.display = 'block';
      document.getElementById('app-container').style.display = 'none';
      document.getElementById('userSelect').selectedIndex = 0;
    }

    function checkLoginState() {
      const user = sessionStorage.getItem('loggedInUser');
      if (user && USERS.includes(user)) {
        currentUsername = user;
        workDataCache = {};
        workDataCacheKey = null;
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        document.getElementById('currentUser').textContent = `用户: ${user}`;
        initApp();
      } else {
        document.getElementById('login-container').style.display = 'block';
        document.getElementById('app-container').style.display = 'none';
      }
    }

    // --- UI Interaction ---
    async function clockIn() {
      await ensureMonthLoaded(selectedYear, selectedMonth);
      const data = getData();
      const nowIso = new Date().toISOString();
      const today = formatDateLocal(new Date(nowIso));

      if (!supabaseClient) {
        if (!data[today]) data[today] = [];
        data[today].push(nowIso);
        saveLocalData({ ...getLocalData(), [today]: data[today] });
        render();
        return;
      }

      const { data: inserted, error } = await supabaseClient
        .from('time_entries')
        .insert({ username: currentUsername, entry_ts: nowIso })
        .select('id, entry_ts')
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      if (!data[today]) data[today] = [];
      data[today].push({ id: inserted.id, ts: inserted.entry_ts });
      render();
    }

    async function manualAdd() {
      const date = document.getElementById('manualDate').value;
      const time = document.getElementById('manualTime').value;
      if (!date || !time) return alert('请选择日期和时间');

      await ensureMonthLoaded(selectedYear, selectedMonth);
      const data = getData();
      const tsIso = new Date(`${date}T${time}`).toISOString();

      if (!supabaseClient) {
        if (!data[date]) data[date] = [];
        data[date].push(tsIso);
        saveLocalData({ ...getLocalData(), [date]: data[date] });
        hideManualModal();
        render();
        return;
      }

      const { data: inserted, error } = await supabaseClient
        .from('time_entries')
        .insert({ username: currentUsername, entry_ts: tsIso })
        .select('id, entry_ts')
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      if (!data[date]) data[date] = [];
      data[date].push({ id: inserted.id, ts: inserted.entry_ts });
      hideManualModal();
      render();
    }

    async function deleteTime(date, idOrIndex) {
      if (!confirm('确定要删除这条打卡记录吗？')) return;

      await ensureMonthLoaded(selectedYear, selectedMonth);
      const data = getData();
      const list = data[date] || [];

      if (!supabaseClient) {
        if (typeof idOrIndex === 'number') {
          list.splice(idOrIndex, 1);
          data[date] = list;
          saveLocalData({ ...getLocalData(), [date]: list });
        }
        render();
        return;
      }

      const entryId = String(idOrIndex);
      const { error } = await supabaseClient
        .from('time_entries')
        .delete()
        .eq('id', entryId)
        .eq('username', currentUsername);

      if (error) {
        alert(error.message);
        return;
      }

      data[date] = list.filter((x) => (typeof x === 'string' ? true : x.id !== entryId));
      render();
    }

    function selectDate(dateStr) {
      currentSelectedDate = dateStr;
      render();
    }

    function onMonthChange() {
      const yearSelect = document.getElementById('yearSelect');
      const monthSelect = document.getElementById('monthSelect');
      const newYear = parseInt(yearSelect.value, 10);
      const newMonth = parseInt(monthSelect.value, 10);

      if (newYear !== selectedYear) {
        selectedYear = newYear;
        updateMonthOptions();
        // Ensure the selected month is valid for the new year
        selectedMonth = parseInt(document.getElementById('monthSelect').value, 10);
      } else {
        selectedMonth = newMonth;
      }

      currentSelectedDate = formatDateLocal(new Date(selectedYear, selectedMonth, 1));
      render();
    }

    function showManualModal() {
      document.getElementById('manualDate').value = currentSelectedDate;
      document.getElementById('manualModal').style.display = 'block';
    }

    function hideManualModal() {
      document.getElementById('manualModal').style.display = 'none';
    }

    // --- Rendering Logic ---
    async function render() {
      const seq = ++renderSeq;
      await ensureMonthLoaded(selectedYear, selectedMonth);
      if (seq !== renderSeq) return;
      renderCalendar();
      renderDayDetails(currentSelectedDate);
    }

    function initApp() {
      initSelectors();
      render();
    }

    function initSelectors() {
      const yearSelect = document.getElementById('yearSelect');
      const now = new Date();
      const currentYear = now.getFullYear();

      yearSelect.innerHTML = '';
      for (let y = 2026; y <= currentYear; y++) {
        const option = document.createElement('option');
        option.value = y;
        option.textContent = y + '年';
        yearSelect.appendChild(option);
      }
      yearSelect.value = selectedYear;
      updateMonthOptions();
    }

    function updateMonthOptions() {
      const monthSelect = document.getElementById('monthSelect');
      const year = parseInt(document.getElementById('yearSelect').value);
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();

      const previouslySelectedMonth = selectedMonth;
      monthSelect.innerHTML = '';
      const maxMonth = (year === currentYear) ? currentMonth : 11;

      for (let m = 0; m <= maxMonth; m++) {
        const option = document.createElement('option');
        option.value = m;
        option.textContent = (m + 1) + '月';
        monthSelect.appendChild(option);
      }

      if (year === selectedYear && previouslySelectedMonth <= maxMonth) {
        monthSelect.value = previouslySelectedMonth;
      } else {
        monthSelect.value = maxMonth;
        selectedMonth = maxMonth;
      }
    }

    function renderCalendar() {
      const data = getData();
      const todayStr = getTodayKey();
      const year = selectedYear;
      const month = selectedMonth;

      const firstDayOfMonth = new Date(year, month, 1).getDay();
      const offset = (firstDayOfMonth === 0) ? 6 : firstDayOfMonth - 1;
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';

      for (let i = 0; i < offset; i++) {
        grid.insertAdjacentHTML('beforeend', '<div class="day empty-day"></div>');
      }

      let totalMonthHours = 0;
      let workingDays = 0;

      for (let i = 1; i <= daysInMonth; i++) {
        const dateObj = new Date(year, month, i);
        const dateStr = formatDateLocal(dateObj);
        const div = document.createElement('div');
        div.className = 'day';
        if (dateStr === todayStr) div.classList.add('today');
        if (dateStr === currentSelectedDate) div.classList.add('selected');
        div.onclick = () => selectDate(dateStr);

        const timesRaw = data[dateStr] || [];
        const times = normalizeTimes(timesRaw);
        const status = getStatus(times);
        const hours = calculateHours(times);

        if (status === 'ok') {
          totalMonthHours += hours;
          workingDays++;
        }

        let hoursText = status === 'ok' ? `${hours.toFixed(2)}h` : (status === 'single' ? '仅打卡1次' : '0h');
        let hoursColor = status === 'none' ? '#ccc' : '#333';

        div.innerHTML = `
          <div class="date">${i}</div>
          <div class="dot ${status}"></div>
          <div class="hours" style="color: ${hoursColor}">${hoursText}</div>
        `;
        grid.appendChild(div);
      }

      document.getElementById('summarySection').innerHTML = `
        <div class="stat-card">
          <h3>本月总工时</h3>
          <span class="stat-value">${totalMonthHours.toFixed(2)} h</span>
        </div>
        <div class="stat-card">
          <h3>有效出勤</h3>
          <span class="stat-value">${workingDays} 天</span>
        </div>
        <div class="stat-card">
          <h3>日均工时</h3>
          <span class="stat-value">${workingDays > 0 ? (totalMonthHours / workingDays).toFixed(2) : '0.00'} h</span>
        </div>
      `;
    }

    function renderDayDetails(date) {
      const data = getData();
      const timesRaw = data[date] || [];
      const times = normalizeTimes(timesRaw);
      const status = getStatus(times);

      document.getElementById('selectedDateHeader').innerText = `${date} 详情`;
      const timeEntries = document.getElementById('timeEntries');
      timeEntries.innerHTML = '';

      const ul = document.createElement('ul');
      ul.className = 'time-list';

      if (times.length === 0) {
        ul.innerHTML = '<li class="time-item">暂无打卡记录</li>';
      } else {
        const sorted = (timesRaw || []).slice().sort((a, b) => {
          const ta = (typeof a === 'string') ? a : a.ts;
          const tb = (typeof b === 'string') ? b : b.ts;
          return ta.localeCompare(tb);
        });

        sorted.forEach((t, i) => {
          const ts = (typeof t === 'string') ? t : t.ts;
          const deleteArg = (typeof t === 'string') ? i : `'${t.id}'`;
          const li = document.createElement('li');
          li.className = 'time-item';
          li.innerHTML = `
            <span>${new Date(ts).toLocaleTimeString()}</span>
            <button class="btn-icon" onclick="deleteTime('${date}', ${deleteArg})" title="删除">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
              </svg>
            </button>
          `;
          ul.appendChild(li);
        });
      }
      timeEntries.appendChild(ul);

      const summaryDiv = document.createElement('div');
      if (status === 'ok') {
        summaryDiv.innerHTML = `<div style="font-weight: bold; color: #28a745;">当日总工时: ${calculateHours(times).toFixed(2)} 小时</div>`;
      } else if (status === 'single') {
        summaryDiv.innerHTML = '<div style="color: #ffc107;">记录不完整，建议补录</div>';
      }
      timeEntries.appendChild(summaryDiv);
    }

    function calculateHours(times) {
      if (times.length < 2) return 0;
      const sorted = times.map(t => new Date(t)).sort((a, b) => a - b);
      return (sorted[sorted.length - 1] - sorted[0]) / (1000 * 60 * 60);
    }

    function getStatus(times) {
      if (!times || times.length === 0) return 'none';
      if (times.length === 1) return 'single';
      return 'ok';
    }

    // --- App Initialization ---
    document.addEventListener('DOMContentLoaded', checkLoginState);

  </script>
</body>
</html>
